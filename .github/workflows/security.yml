name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6AM UTC

permissions:
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          if grep -rn "password\s*[:=]\s*['\"][^'\"]*['\"]" apps/ packages/ --include="*.ts" --include="*.js" --include="*.py" | grep -v "change-me" | grep -v "node_modules" | grep -v ".example"; then
            echo "::warning::Possible hardcoded secrets found"
            FOUND=1
          fi
          if grep -rn "AKIA[0-9A-Z]\{16\}" apps/ packages/; then
            echo "::error::AWS access key found"
            FOUND=1
          fi
          exit $FOUND || true
