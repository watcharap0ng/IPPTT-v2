services:
  # === Application Services ===

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:3001
    depends_on:
      - backend
    networks:
      - ipptt

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ipptt
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - MQTT_URL=mqtt://mosquitto:1883
      - MURMUR_REST_URL=http://murmur-rest:5000
      - TRACCAR_URL=http://traccar:8082
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongo
      - mosquitto
    networks:
      - ipptt

  # === Voice Service ===

  murmur:
    image: mumblevoip/mumble-server:latest
    ports:
      - "64738:64738/tcp"
      - "64738:64738/udp"
    volumes:
      - ./config/murmur/murmur.ini:/etc/mumble/config.ini:ro
      - murmur-data:/data
    networks:
      - ipptt

  murmur-rest:
    build:
      context: ./apps/murmur-rest
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MURMUR_ICE_HOST=murmur
      - MURMUR_ICE_PORT=6502
    depends_on:
      - murmur
    networks:
      - ipptt

  # === IoT / MQTT ===

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - ipptt

  # === GPS Tracking ===

  traccar:
    image: traccar/traccar:latest
    ports:
      - "8082:8082"
      - "5055:5055/tcp"
      - "5055:5055/udp"
    volumes:
      - ./config/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar-data:/opt/traccar/data
    networks:
      - ipptt

  # === Database ===

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ipptt

  # === Reverse Proxy ===

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ipptt

volumes:
  mongo-data:
  murmur-data:
  mosquitto-data:
  mosquitto-log:
  traccar-data:

networks:
  ipptt:
    driver: bridge
